<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fit Track - Login</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --brand-red: #bb131a;     
            --brand-dark-red: #900f14;
            --brand-black: #111111;   
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: url('images/background.jpg');
            background-size: cover;
            background-position: center;
            background-color: var(--brand-black);
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            margin: 20px;
            background: rgba(17, 17, 17, 0.75); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            padding: 45px 35px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
        }

        .logo-header { margin-bottom: 30px; }
        
        .logo-header h3 { 
            color: #fff; 
            font-size: 2.2rem; 
            font-weight: 400; 
            letter-spacing: 2px; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .logo-header span { 
            color: var(--brand-red); 
            font-weight: 400;
        }

        .input-group {
            margin-bottom: 20px !important;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .input-group:focus-within {
            border-color: var(--brand-red);
            box-shadow: 0 0 0 3px rgba(187, 19, 26, 0.25);
        }

        .input-group-text { background-color: rgba(0, 0, 0, 0.4); color: #aaa; border: none; padding: 0 15px; }
        .form-control { background-color: rgba(0, 0, 0, 0.4); border: none; color: #fff; padding: 14px 12px; }
        .form-control::placeholder { color: #777; }
        .form-control:focus { background-color: rgba(0, 0, 0, 0.6); color: #fff; box-shadow: none; }

        .password-toggle { cursor: pointer; background-color: rgba(0, 0, 0, 0.4); border: none; color: #aaa; }
        .password-toggle:hover { color: var(--brand-red); }

        .btn-brand {
            width: 100%;
            background-color: var(--brand-red);
            color: white;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 14px;
            border-radius: 8px;
            border: none;
            text-transform: uppercase;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        .btn-brand:hover { 
            background-color: var(--brand-dark-red); 
            color: white; 
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(187, 19, 26, 0.4);
        }

        .link-text { color: #aaa; text-decoration: none; cursor: pointer; font-size: 0.9rem; transition: 0.3s; }
        .link-text:hover { color: var(--brand-red); }

        .form-box { display: none; }
        .active-form { display: block; animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-header">
            <h3>FIT<span>TRACK</span></h3>
        </div>

        <div id="loginBox" class="form-box active-form">
            <form id="loginForm">
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="email" id="emailInput" class="form-control" placeholder="Email Address" required>
                </div>

                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" id="passwordInput" class="form-control" placeholder="Password" required>
                    <span class="input-group-text password-toggle" onclick="togglePassword('passwordInput', 'toggleIcon')">
                        <i class="fas fa-eye" id="toggleIcon"></i>
                    </span>
                </div>

                <button type="submit" class="btn btn-brand mb-3">Login</button>
                <div class="text-end mt-2"><span class="link-text" onclick="switchForm('forgot')">Forgot Password?</span></div>
            </form>
        </div>

        <div id="forgotBox" class="form-box">
            <form id="forgotForm">
                <p class="text-light mb-4" style="font-size: 0.9rem;">Enter your email to receive a password reset link.</p>
                <div class="input-group mb-4">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input type="email" class="form-control" placeholder="Enter your email" required>
                </div>
                <button type="submit" class="btn btn-brand mb-4">Send Link</button>
                <div class="pt-2 border-top border-secondary mt-2">
                    <span class="link-text" onclick="switchForm('login')"><i class="fas fa-arrow-left me-2"></i>Back to Login</span>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB5xluf59a0X6v-_TNzR6Ny0mtcjSVWyLA",
            authDomain: "fit-track-ca8d1.firebaseapp.com",
            projectId: "fit-track-ca8d1",
            storageBucket: "fit-track-ca8d1.firebasestorage.app",
            messagingSenderId: "157593985795",
            appId: "1:157593985795:web:07156961dda8e2254fbf36",
            measurementId: "G-NYGGEMMJMC"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- TEMPORARY FUNCTION TO ADD ADMIN ---
        window.setupAdminAccount = async function() {
            try {
                const usersRef = collection(db, "users");
                await addDoc(usersRef, {
                    name: "System Admin",
                    email: "admin@gmail.com",
                    password: "password123",
                    role: "Admin"
                });
                alert("Success! Admin account added to the Firebase 'users' collection.");
            } catch (error) {
                console.error("Error adding admin: ", error);
            }
        };

        window.switchForm = function(view) {
            const loginBox = document.getElementById('loginBox');
            const forgotBox = document.getElementById('forgotBox');
            loginBox.classList.remove('active-form');
            forgotBox.classList.remove('active-form');
            setTimeout(() => {
                if (view === 'forgot') { forgotBox.classList.add('active-form'); } 
                else { loginBox.classList.add('active-form'); }
            }, 50);
        };

        window.togglePassword = function(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        };

        // --- ROLE-BASED LOGIN LOGIC ---
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault(); 
            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value.trim();

            try {
                const usersRef = collection(db, "users");
                const q = query(usersRef, where("email", "==", email), where("password", "==", password));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    const userData = querySnapshot.docs[0].data(); 
                    localStorage.setItem("loggedInUser", userData.name);
                    localStorage.setItem("userRole", userData.role);

                    // Check if they are an Admin
                    if (userData.role === "Admin") {
                        alert("Login Successful! Welcome, Admin.");
                        window.location.href = 'adminDB.html'; // Directs straight to the admin dashboard
                    } else {
                        // For now, if anyone else tries to log in, we'll just alert them
                        alert("Login Successful! (Redirect for " + userData.role + " coming soon!)");
                    }
                } else {
                    alert("Invalid Email or Password. Please try again.");
                }
            } catch (error) {
                console.error("Database error: ", error);
                alert("Could not connect to the database. Please check your internet connection.");
            }
        });

        document.getElementById('forgotForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert("Reset link sent to your email!");
            window.switchForm('login'); 
        });
    </script>
</body>
</html>
