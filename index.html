<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fit Track - Login</title>

    <link rel="icon" type="image/png" href="images/icon-192.png">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111111">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/styles.css">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => console.log('ServiceWorker registered!'))
                    .catch(err => console.log('ServiceWorker failed: ', err));
            });
        }
    </script>

    <style>
        /* Mobile-Optimized Login Styles */
        body { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background-color: var(--dark-black); 
            height: 100vh; 
            margin: 0; 
            padding: 20px; 
        }

        .login-container { 
            background: var(--white); 
            padding: 40px 30px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            width: 100%; 
            max-width: 450px; 
            text-align: center; 
        }

        .login-logo { 
            font-size: 2.8rem; 
            font-weight: 700; 
            margin-bottom: 40px; 
            letter-spacing: 1px; 
            color: var(--dark-black); 
        }

        .login-logo span { 
            color: var(--primary-red); 
        }
        
        .login-form input { 
            width: 100%; 
            padding: 18px; 
            margin-bottom: 20px; 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            outline: none; 
            font-size: 16px; 
            box-sizing: border-box; 
        }

        .login-form input:focus { 
            border-color: var(--primary-red); 
        }
        
        .login-btn { 
            width: 100%; 
            padding: 18px; 
            background-color: var(--primary-red); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
        }

        .login-btn:hover { 
            background-color: #900f14; 
        }

        .login-btn:disabled { 
            background-color: #e0abae; 
            cursor: not-allowed; 
        }
        
        #errorMsg { 
            color: var(--primary-red); 
            margin-bottom: 15px; 
            font-size: 14px; 
            display: none; 
            font-weight: 500; 
        }
        
        #installAppBtn { 
            display: none; 
            width: 100%; 
            padding: 18px; 
            margin-top: 20px; 
            background-color: #333; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.3s; 
        }

        #installAppBtn:hover { 
            background-color: #111; 
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-logo">FIT<span>TRACK</span></div>
        <div id="errorMsg">Invalid email or password.</div>
        
        <form class="login-form" id="loginForm">
            <input type="email" id="loginEmail" placeholder="Email Address" required>
            <input type="password" id="loginPassword" placeholder="Password" required>
            <button type="submit" class="login-btn" id="loginSubmitBtn">Log In</button>
        </form>

        <p style="color: #888; font-size: 13px; margin-top: 20px;">
            <i class="fas fa-id-badge"></i> Or simply tap your ID Card to log in.
        </p>

        <button id="installAppBtn">
            <i class="fa-solid fa-download"></i> Install Fit Track App
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const loginConfig = {
            apiKey: "AIzaSyB5xluf59a0X6v-_TNzR6Ny0mtcjSVWyLA",
            authDomain: "fit-track-ca8d1.firebaseapp.com",
            projectId: "fit-track-ca8d1",
            storageBucket: "fit-track-ca8d1.firebasestorage.app",
            messagingSenderId: "157593985795",
            appId: "1:157593985795:web:07156961dda8e2254fbf36",
            measurementId: "G-NYGGEMMJMC"
        };

        const app = initializeApp(loginConfig);
        const db = getFirestore(app);

        // --- DEVICE DETECTION HELPER ---
        const isMobileDevice = () => {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth <= 800;
        };

        const currentUser = localStorage.getItem("loggedInUser");
        const currentRole = localStorage.getItem("userRole");
        const onMobile = isMobileDevice();

        // Auto-redirect if already logged in (with strict device enforcement)
        if (currentUser && currentRole) {
            if ((currentRole === "Admin" || currentRole === "Staff") && onMobile) {
                localStorage.removeItem("loggedInUser");
                localStorage.removeItem("userRole");
            } else if ((currentRole === "Member" || currentRole === "Trainer") && !onMobile) {
                localStorage.removeItem("loggedInUser");
                localStorage.removeItem("userRole");
            } else {
                if (currentRole === "Admin") window.location.replace("adminDB.html");
                else if (currentRole === "Staff") window.location.replace("staffDB.html");
                else if (currentRole === "Trainer") window.location.replace("trainerDB.html");
                else if (currentRole === "Member") window.location.replace("memberDB.html");
            }
        }

        // ==========================================
        // STANDARD EMAIL & PASSWORD LOGIN
        // ==========================================
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            
            await authenticateUser(query(collection(db, "users"), where("email", "==", email), where("password", "==", password)));
        });

        // ==========================================
        // SMART USB RFID GHOST LISTENER (LOGIN PAGE)
        // ==========================================
        let rfidBuffer = "";
        let lastKeyTime = Date.now();

        document.addEventListener('keydown', async (e) => {
            const currentTime = Date.now();

            if (currentTime - lastKeyTime > 50) { 
                rfidBuffer = ""; 
            }

            if (e.key === 'Enter' && rfidBuffer.length > 5) {
                e.preventDefault(); // Stop the form from submitting normally

                const activeEl = document.activeElement;
                // Clean up text boxes if they were focused so we don't leave scanner garbage behind
                if (activeEl && activeEl.tagName === 'INPUT') {
                    let currentVal = activeEl.value;
                    if (currentVal.endsWith(rfidBuffer)) {
                        activeEl.value = currentVal.slice(0, -rfidBuffer.length);
                    }
                    activeEl.blur(); 
                }

                const scannedRfid = rfidBuffer;
                rfidBuffer = ""; // Clear buffer
                
                // Authenticate using the RFID!
                await authenticateUser(query(collection(db, "users"), where("rfid", "==", scannedRfid)));
                
            } else if (e.key.length === 1 && /[a-zA-Z0-9]/.test(e.key)) { 
                rfidBuffer += e.key;
            }
            
            lastKeyTime = currentTime;
        });

        // ==========================================
        // CORE AUTHENTICATION LOGIC (Shared by both)
        // ==========================================
        async function authenticateUser(dbQuery) {
            const errorMsg = document.getElementById('errorMsg');
            const submitBtn = document.getElementById('loginSubmitBtn');

            submitBtn.innerText = "Authenticating...";
            submitBtn.disabled = true;
            errorMsg.style.display = "none";

            try {
                const querySnapshot = await getDocs(dbQuery);

                if (querySnapshot.empty) {
                    errorMsg.innerText = "Invalid credentials or unrecognized ID Card.";
                    errorMsg.style.display = "block";
                    submitBtn.innerText = "Log In";
                    submitBtn.disabled = false;
                    return;
                } 
                
                const userData = querySnapshot.docs[0].data();
                
                if (userData.status === 'Archived') {
                    errorMsg.innerText = "This account has been archived. Please contact admin.";
                    errorMsg.style.display = "block";
                    submitBtn.innerText = "Log In";
                    submitBtn.disabled = false;
                    return;
                }

                const userOnMobile = isMobileDevice();
                
                if ((userData.role === "Admin" || userData.role === "Staff") && userOnMobile) {
                    errorMsg.innerText = "Access Denied: Admins and Staff must log in using a Desktop/PC.";
                    errorMsg.style.display = "block";
                    submitBtn.innerText = "Log In";
                    submitBtn.disabled = false;
                    return;
                }

                if ((userData.role === "Member" || userData.role === "Trainer") && !userOnMobile) {
                    errorMsg.innerText = "Access Denied: Members and Trainers must log in using the Mobile App.";
                    errorMsg.style.display = "block";
                    submitBtn.innerText = "Log In";
                    submitBtn.disabled = false;
                    return;
                }

                localStorage.setItem("loggedInUser", userData.name || userData.givenName);
                localStorage.setItem("userRole", userData.role);
                // Save the RFID to local storage so the dashboard knows the ID of the logged-in user
                if(userData.rfid) localStorage.setItem("userRfid", userData.rfid);

                if (userData.role === "Admin") window.location.replace("adminDB.html");
                else if (userData.role === "Staff") window.location.replace("staffDB.html");
                else if (userData.role === "Trainer") window.location.replace("trainerDB.html");
                else if (userData.role === "Member") window.location.replace("memberDB.html");
                else {
                    errorMsg.innerText = "Account role is undefined.";
                    errorMsg.style.display = "block";
                    submitBtn.innerText = "Log In";
                    submitBtn.disabled = false;
                }
                
            } catch (error) {
                console.error("Error logging in:", error);
                errorMsg.innerText = "Connection error. Check your internet and try again.";
                errorMsg.style.display = "block";
                submitBtn.innerText = "Log In";
                submitBtn.disabled = false;
            }
        }
    </script>

    <script>
        let deferredPrompt;
        const installBtn = document.getElementById('installAppBtn');

        const isMobilePWA = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth <= 800;

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            if (isMobilePWA) {
                deferredPrompt = e;
                installBtn.style.display = 'block';
            }
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt !== null) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    console.log('User accepted the PWA install prompt');
                } else {
                    console.log('User dismissed the PWA install prompt');
                }
                deferredPrompt = null;
                installBtn.style.display = 'none';
            }
        });

        window.addEventListener('appinstalled', () => {
            installBtn.style.display = 'none';
            console.log('Fit Track PWA was installed successfully');
        });
    </script>
</body>
</html>
