<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fit Track - Login</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111111">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/styles.css">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => console.log('ServiceWorker registered!'))
                    .catch(err => console.log('ServiceWorker failed: ', err));
            });
        }
    </script>

    <style>
        /* Mobile-Optimized Login Styles */
        body { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background-color: var(--dark-black); 
            height: 100vh; 
            margin: 0; 
            padding: 20px; 
        }

        .login-container { 
            background: var(--white); 
            padding: 40px 30px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            width: 100%; 
            max-width: 450px; 
            text-align: center; 
        }

        .login-logo { 
            font-size: 2.8rem; 
            font-weight: 700; 
            margin-bottom: 40px; 
            letter-spacing: 1px; 
            color: var(--dark-black); 
        }

        .login-logo span { 
            color: var(--primary-red); 
        }
        
        .login-form input { 
            width: 100%; 
            padding: 18px; 
            margin-bottom: 20px; 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            outline: none; 
            font-size: 16px; 
            box-sizing: border-box; 
        }

        .login-form input:focus { 
            border-color: var(--primary-red); 
        }
        
        .login-btn { 
            width: 100%; 
            padding: 18px; 
            background-color: var(--primary-red); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
        }

        .login-btn:hover { 
            background-color: #900f14; 
        }

        .login-btn:disabled { 
            background-color: #e0abae; 
            cursor: not-allowed; 
        }
        
        #errorMsg { 
            color: var(--primary-red); 
            margin-bottom: 15px; 
            font-size: 14px; 
            display: none; 
            font-weight: 500; 
        }
        
        #installAppBtn { 
            display: none; 
            width: 100%; 
            padding: 18px; 
            margin-top: 20px; 
            background-color: #333; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.3s; 
        }

        #installAppBtn:hover { 
            background-color: #111; 
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-logo">FIT<span>TRACK</span></div>
        <div id="errorMsg">Invalid email or password.</div>
        
        <form class="login-form" id="loginForm">
            <input type="email" id="loginEmail" placeholder="Email Address" required>
            <input type="password" id="loginPassword" placeholder="Password" required>
            <button type="submit" class="login-btn" id="loginSubmitBtn">Log In</button>
        </form>

        <button id="installAppBtn">
            <i class="fa-solid fa-download"></i> Install Fit Track App
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const loginConfig = {
            apiKey: "AIzaSyB5xluf59a0X6v-_TNzR6Ny0mtcjSVWyLA",
            authDomain: "fit-track-ca8d1.firebaseapp.com",
            projectId: "fit-track-ca8d1",
            storageBucket: "fit-track-ca8d1.firebasestorage.app",
            messagingSenderId: "157593985795",
            appId: "1:157593985795:web:07156961dda8e2254fbf36",
            measurementId: "G-NYGGEMMJMC"
        };

        const app = initializeApp(loginConfig);
        const db = getFirestore(app);

        const currentUser = localStorage.getItem("loggedInUser");
        const currentRole = localStorage.getItem("userRole");
        if (currentUser && currentRole) {
            if (currentRole === "Admin") {
                window.location.replace("adminDB.html");
            } else if (currentRole === "Staff" || currentRole === "Trainer") {
                window.location.replace("staffDB.html");
            } else if (currentRole === "Member") {
                window.location.replace("memberDB.html");
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const submitBtn = document.getElementById('loginSubmitBtn');

            submitBtn.innerText = "Authenticating...";
            submitBtn.disabled = true;
            errorMsg.style.display = "none";

            try {
                const q = query(collection(db, "users"), where("email", "==", email), where("password", "==", password));
                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    errorMsg.innerText = "Invalid email or password.";
                    errorMsg.style.display = "block";
                    submitBtn.innerText = "Log In";
                    submitBtn.disabled = false;
                } else {
                    const userData = querySnapshot.docs[0].data();
                    
                    if (userData.status === 'Archived') {
                        errorMsg.innerText = "This account has been archived. Please contact admin.";
                        errorMsg.style.display = "block";
                        submitBtn.innerText = "Log In";
                        submitBtn.disabled = false;
                        return;
                    }

                    localStorage.setItem("loggedInUser", userData.name || userData.givenName);
                    localStorage.setItem("userRole", userData.role);

                    if (userData.role === "Admin") {
                        window.location.replace("adminDB.html");
                    } else if (userData.role === "Staff" || userData.role === "Trainer") {
                        window.location.replace("staffDB.html");
                    } else if (userData.role === "Member") {
                        window.location.replace("memberDB.html");
                    } else {
                        errorMsg.innerText = "Account role is undefined.";
                        errorMsg.style.display = "block";
                        submitBtn.innerText = "Log In";
                        submitBtn.disabled = false;
                    }
                }
            } catch (error) {
                console.error("Error logging in:", error);
                errorMsg.innerText = "Connection error. Check your internet and try again.";
                errorMsg.style.display = "block";
                submitBtn.innerText = "Log In";
                submitBtn.disabled = false;
            }
        });
    </script>

    <script>
        let deferredPrompt;
        const installBtn = document.getElementById('installAppBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt !== null) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    console.log('User accepted the PWA install prompt');
                } else {
                    console.log('User dismissed the PWA install prompt');
                }
                deferredPrompt = null;
                installBtn.style.display = 'none';
            }
        });

        window.addEventListener('appinstalled', () => {
            installBtn.style.display = 'none';
            console.log('Fit Track PWA was installed successfully');
        });
    </script>
</body>
</html>
