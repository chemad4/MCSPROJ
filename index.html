<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fit Track - Login & Register</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script>
        const activeUser = localStorage.getItem("loggedInUser");
        const activeRole = localStorage.getItem("userRole");
        
        if (activeUser) {
            if (activeRole === "Admin") {
                window.location.replace("adminDB.html"); 
            } else if (activeRole === "Staff") {
                window.location.replace("staffDB.html");
            }
        }
    </script>

    <style>
        :root {
            --brand-red: #bb131a;     
            --brand-dark-red: #900f14;
            --brand-black: #111111;   
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #2a2a2a; 
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            background: rgba(17, 17, 17, 0.85); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            padding: 40px 40px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            text-align: center;
            position: relative;
        }

        .logo-header { margin-bottom: 30px; }
        
        .logo-header h3 { 
            color: #fff; 
            font-size: 3.2rem; 
            font-family: Arial, Helvetica, sans-serif; 
            font-weight: bold; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .logo-header span { color: var(--brand-red); font-weight: bold; }

        .input-group {
            margin-bottom: 20px !important;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .input-group:focus-within { border-color: var(--brand-red); box-shadow: 0 0 10px rgba(187, 19, 26, 0.3); }

        .input-group-text { background-color: rgba(0, 0, 0, 0.5); color: #888; border: none; padding: 0 18px; }
        .form-control { background-color: rgba(0, 0, 0, 0.5); border: none; color: #fff; padding: 15px 12px; }
        .form-control::placeholder { color: #666; }
        .form-control:focus { background-color: rgba(0, 0, 0, 0.7); color: #fff; box-shadow: none; }

        .name-row { display: grid; grid-template-columns: 1fr 70px 1fr; gap: 10px; margin-bottom: 20px; }
        .custom-input { 
            background-color: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; 
            padding: 15px 12px; border-radius: 6px; outline: none; transition: 0.3s; width: 100%;
        }
        .custom-input:focus { border-color: var(--brand-red); box-shadow: 0 0 10px rgba(187, 19, 26, 0.3); }
        .custom-input::placeholder { color: #666; }

        .password-toggle { cursor: pointer; background-color: rgba(0, 0, 0, 0.5); border: none; color: #888; }
        .password-toggle:hover { color: var(--brand-red); }

        .btn-brand {
            width: 100%; background-color: var(--brand-red); color: white; font-weight: 700;
            letter-spacing: 1px; padding: 15px; border-radius: 6px; border: none;
            text-transform: uppercase; transition: all 0.3s ease; margin-top: 10px;
            box-shadow: 0 6px 15px rgba(187, 19, 26, 0.3);
        }
        
        .btn-brand:hover { background-color: var(--brand-dark-red); color: white; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(187, 19, 26, 0.5); }

        .link-text { color: #888; text-decoration: none; cursor: pointer; font-size: 0.9rem; transition: 0.3s; }
        .link-text:hover { color: #fff; text-decoration: underline; }

        .form-box { display: none; }
        .active-form { display: block; animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-header">
            <h3>FIT<span>TRACK</span></h3>
        </div>

        <div id="loginBox" class="form-box active-form">
            <form id="loginForm">
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="email" id="emailInput" class="form-control" placeholder="Email Address" required>
                </div>

                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" id="passwordInput" class="form-control" placeholder="Password" required>
                    <span class="input-group-text password-toggle" onclick="togglePassword('passwordInput', 'toggleIcon')">
                        <i class="fas fa-eye" id="toggleIcon"></i>
                    </span>
                </div>

                <button type="submit" class="btn btn-brand mb-3">LOGIN</button>
                <div class="d-flex justify-content-between mt-2 px-1">
                    <span class="link-text" onclick="switchForm('forgot')">Forgot Password?</span>
                    <span class="link-text" onclick="switchForm('register')" style="color: var(--brand-red);">Create Account</span>
                </div>
            </form>
        </div>

        <div id="registerBox" class="form-box">
            <form id="registerForm">
                <p class="text-light mb-3" style="font-size: 1rem; font-weight: bold;">Sign Up / Register</p>
                
                <div class="name-row">
                    <input type="text" id="regGiven" class="custom-input" placeholder="Given Name" required>
                    <input type="text" id="regMI" class="custom-input" placeholder="M.I." maxlength="2" required>
                    <input type="text" id="regFamily" class="custom-input" placeholder="Family Name" required>
                </div>

                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input type="email" id="regEmail" class="form-control" placeholder="Email Address" required>
                </div>

                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" id="regPassword" class="form-control" placeholder="Create Password" required>
                </div>

                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-check"></i></span>
                    <input type="password" id="regConfirmPassword" class="form-control" placeholder="Confirm Password" required>
                </div>

                <button type="submit" class="btn btn-brand mb-4">REGISTER ACCOUNT</button>
                <div class="pt-2 border-top border-secondary mt-2">
                    <span class="link-text" onclick="switchForm('login')"><i class="fas fa-arrow-left me-2"></i> Back to Login</span>
                </div>
            </form>
        </div>

        <div id="forgotBox" class="form-box">
            <form id="forgotForm">
                <p class="text-light mb-4" style="font-size: 0.9rem;">Enter your email to receive a password reset link.</p>
                <div class="input-group mb-4">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input type="email" class="form-control" placeholder="Email Address" required>
                </div>
                <button type="submit" class="btn btn-brand mb-4">SEND LINK</button>
                <div class="pt-2 border-top border-secondary mt-2">
                    <span class="link-text" onclick="switchForm('login')"><i class="fas fa-arrow-left me-2"></i> Back to Login</span>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB5xluf59a0X6v-_TNzR6Ny0mtcjSVWyLA",
            authDomain: "fit-track-ca8d1.firebaseapp.com",
            projectId: "fit-track-ca8d1",
            storageBucket: "fit-track-ca8d1.firebasestorage.app",
            messagingSenderId: "157593985795",
            appId: "1:157593985795:web:07156961dda8e2254fbf36",
            measurementId: "G-NYGGEMMJMC"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.switchForm = function(view) {
            const loginBox = document.getElementById('loginBox');
            const forgotBox = document.getElementById('forgotBox');
            const registerBox = document.getElementById('registerBox');
            
            loginBox.classList.remove('active-form');
            forgotBox.classList.remove('active-form');
            registerBox.classList.remove('active-form');

            setTimeout(() => {
                if (view === 'forgot') { forgotBox.classList.add('active-form'); } 
                else if (view === 'register') { registerBox.classList.add('active-form'); }
                else { loginBox.classList.add('active-form'); }
            }, 50);
        };

        window.togglePassword = function(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        };

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const given = document.getElementById('regGiven').value.trim();
            const mi = document.getElementById('regMI').value.trim();
            const family = document.getElementById('regFamily').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;

            if (password !== confirmPassword) {
                alert("Passwords do not match! Please try again.");
                return;
            }

            try {
                const usersRef = collection(db, "users");
                const q = query(usersRef, where("email", "==", email));
                const querySnapshot = await getDocs(q);
                
                if (!querySnapshot.empty) {
                    alert("This email is already registered. Please log in.");
                    return;
                }

                await addDoc(usersRef, {
                    name: `${given} ${family}`,
                    givenName: given,
                    mi: mi,
                    familyName: family,
                    email: email,
                    password: password,
                    role: "Member",
                    status: "Active",
                    plan: "Pending Plan" 
                });

                alert("Registration Successful! You can now log in.");
                document.getElementById('registerForm').reset();
                window.switchForm('login');

            } catch (error) {
                console.error("Registration error: ", error);
                alert("Could not register at this time. Check console for details.");
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault(); 
            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value.trim();

            try {
                const usersRef = collection(db, "users");
                const q = query(usersRef, where("email", "==", email), where("password", "==", password));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    const userData = querySnapshot.docs[0].data(); 
                    
                    localStorage.setItem("loggedInUser", userData.name);
                    localStorage.setItem("userRole", userData.role);

                    if (userData.role === "Admin") {
                        window.location.replace('adminDB.html'); 
                    } else if (userData.role === "Staff") {
                        window.location.replace('staffDB.html');
                    } else {
                        alert("Login Successful! Welcome, " + userData.givenName);
                    }
                } else {
                    alert("Invalid Email or Password. Please try again.");
                }
            } catch (error) {
                console.error("Database error: ", error);
                alert("Could not connect to the database. Please check your internet connection.");
            }
        });

        document.getElementById('forgotForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert("Reset link sent to your email!");
            window.switchForm('login'); 
        });
    </script>
</body>
</html>
